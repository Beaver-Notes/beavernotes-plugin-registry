name: Mirror Plugins

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'plugins/**'

permissions:
  contents: write
  packages: write

concurrency:
  group: mirror
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install oras CLI
        run: |
          curl -fsSL https://github.com/oras-project/oras/releases/download/v1.2.0/oras_1.2.0_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin oras
          oras version

      - name: Resolve and mirror to GHCR
        run: node scripts/resolve-and-mirror.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated plugins.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet plugins.json; then
            git add plugins.json
            git commit -m "Update plugins.json with mirrored artifacts [skip ci]"
            git push
          fi
