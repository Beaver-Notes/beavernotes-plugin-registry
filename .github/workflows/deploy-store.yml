name: Deploy Store

on:
  push:
    branches: [main]
    paths:
      - 'store/**'
      - 'plugins/**'
      - '.github/workflows/deploy-store.yml'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: store/package-lock.json

      - name: Install dependencies
        working-directory: store
        run: npm ci

      - name: Generate store plugins.json
        run: npm run generate

      - name: Commit generated store data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet store/public/plugins.json; then
            git add store/public/plugins.json
            git commit -m "Update store plugins.json [skip ci]"
            git push
          fi

      - name: Build
        working-directory: store
        run: npm run build

      - name: Copy enriched plugins.json for app and store
        run: cp plugins.json store/dist/plugins.json

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: store/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
